<div id="content-tasks" class="space-y-6 hidden">
    <!-- Toolbar -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <div>
            <h2 class="text-2xl font-bold text-white">Action Items & Tasks</h2>
            <p class="text-sm text-slate-400 mt-1">Checklists and deadlines for active projects.</p>
        </div>
        <div class="flex items-center flex-wrap gap-3">
            <select onchange="fetchTasks()" id="filter-task-contributor" class="bg-slate-900 border border-slate-800 text-slate-300 text-sm rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-emerald-500">
                <option value="">All Staff</option>
                <!-- Dynamic options -->
            </select>
            <select onchange="fetchTasks()" id="filter-task-overdue" class="bg-slate-900 border border-slate-800 text-slate-300 text-sm rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-emerald-500">
                <option value="">All Deadlines</option>
                <option value="true">Overdue Tasks Only</option>
            </select>
            <button onclick="openModal('task')" class="inline-flex items-center space-x-2 px-4 py-2.5 bg-emerald-500 hover:bg-emerald-400 text-slate-955 font-bold text-sm rounded-xl shadow-lg shadow-emerald-500/20 transition-all duration-200">
                <i class="fa-solid fa-plus"></i>
                <span>New Task</span>
            </button>
        </div>
    </div>

    <!-- Tasks List -->
    <div class="bg-slate-900/40 border border-slate-800/80 rounded-2xl overflow-hidden">
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-slate-800">
                <thead class="bg-slate-900/60">
                    <tr>
                        <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-400 uppercase tracking-wider">Complete</th>
                        <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-400 uppercase tracking-wider">Task Title</th>
                        <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-400 uppercase tracking-wider">Project</th>
                        <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-400 uppercase tracking-wider">Assigned To</th>
                        <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-400 uppercase tracking-wider">Due Date</th>
                        <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-400 uppercase tracking-wider">Status</th>
                        <th scope="col" class="px-6 py-4 text-xs font-semibold text-slate-400 uppercase tracking-wider text-right pr-6">Actions</th>
                    </tr>
                </thead>
                <tbody id="tasks-table-body" class="divide-y divide-slate-800/60 bg-transparent">
                    <!-- Dynamic -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Pagination -->
    <div id="tasks-pagination" class="flex justify-between items-center bg-slate-900/40 p-4 rounded-xl border border-slate-800">
        <!-- Dynamic -->
    </div>
</div>
