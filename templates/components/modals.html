<!-- MODAL: PROJECT FORM -->
<div id="modal-project" class="fixed inset-0 z-50 flex items-center justify-center hidden">
    <div class="absolute inset-0 bg-slate-950/80 backdrop-blur-sm" onclick="closeModal('project')"></div>
    <div class="relative bg-slate-900 border border-slate-800 rounded-2xl w-full max-w-lg p-6 shadow-2xl z-10 mx-4">
        <div class="flex justify-between items-center pb-4 border-b border-slate-800">
            <h3 class="text-lg font-bold text-white" id="modal-project-title">Add New Project</h3>
            <button onclick="closeModal('project')" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-lg"></i></button>
        </div>
        <form id="form-project" onsubmit="saveProject(event)" class="space-y-4 mt-4">
            <input type="hidden" id="project-id">
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Project Name</label>
                <input type="text" id="project-name" required placeholder="e.g. Campus Rainwater Harvesting" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Description</label>
                <textarea id="project-description" required rows="3" placeholder="Explain the project's goal..." class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"></textarea>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Location</label>
                    <input type="text" id="project-location" required placeholder="e.g. Amritapuri Campus" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Status</label>
                    <select id="project-status" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                        <option value="Active">Active</option>
                        <option value="Completed">Completed</option>
                        <option value="On Hold">On Hold</option>
                    </select>
                </div>
            </div>
            <div class="flex justify-end gap-3 pt-4 border-t border-slate-800">
                <button type="button" onclick="closeModal('project')" class="px-4 py-2.5 border border-slate-800 rounded-xl text-slate-400 hover:text-white text-sm font-semibold transition-all duration-200">Cancel</button>
                <button type="submit" class="px-5 py-2.5 bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold text-sm rounded-xl shadow-lg shadow-emerald-500/20 transition-all duration-200">Save Project</button>
            </div>
        </form>
    </div>
</div>

<!-- MODAL: TASK FORM -->
<div id="modal-task" class="fixed inset-0 z-50 flex items-center justify-center hidden">
    <div class="absolute inset-0 bg-slate-950/80 backdrop-blur-sm" onclick="closeModal('task')"></div>
    <div class="relative bg-slate-900 border border-slate-800 rounded-2xl w-full max-w-lg p-6 shadow-2xl z-10 mx-4">
        <div class="flex justify-between items-center pb-4 border-b border-slate-800">
            <h3 class="text-lg font-bold text-white" id="modal-task-title">Add New Task</h3>
            <button onclick="closeModal('task')" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-lg"></i></button>
        </div>
        <form id="form-task" onsubmit="saveTask(event)" class="space-y-4 mt-4">
            <input type="hidden" id="task-id">
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Project</label>
                <select id="task-project" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                    <option value="">Select Project...</option>
                    <!-- Dynamic options -->
                </select>
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Task Title</label>
                <input type="text" id="task-title" required placeholder="e.g. Install Filter Screen" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Description</label>
                <textarea id="task-description" required rows="2" placeholder="Task checklist and actions..." class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"></textarea>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Due Date</label>
                    <input type="date" id="task-due-date" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Assignee</label>
                    <select id="task-assignee" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                        <option value="">Unassigned</option>
                        <!-- Dynamic options -->
                    </select>
                </div>
            </div>
            <div class="flex items-center space-x-2 py-2">
                <input type="checkbox" id="task-is-completed" class="h-4 w-4 rounded border-slate-800 bg-slate-950 text-emerald-500 focus:ring-emerald-500 focus:ring-offset-slate-900">
                <label for="task-is-completed" class="text-sm text-slate-300">Mark as completed</label>
            </div>
            <div class="flex justify-end gap-3 pt-4 border-t border-slate-800">
                <button type="button" onclick="closeModal('task')" class="px-4 py-2.5 border border-slate-800 rounded-xl text-slate-400 hover:text-white text-sm font-semibold transition-all duration-200">Cancel</button>
                <button type="submit" class="px-5 py-2.5 bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold text-sm rounded-xl shadow-lg shadow-emerald-500/20 transition-all duration-200">Save Task</button>
            </div>
        </form>
    </div>
</div>

<!-- MODAL: CONTRIBUTOR FORM -->
<div id="modal-contributor" class="fixed inset-0 z-50 flex items-center justify-center hidden">
    <div class="absolute inset-0 bg-slate-950/80 backdrop-blur-sm" onclick="closeModal('contributor')"></div>
    <div class="relative bg-slate-900 border border-slate-800 rounded-2xl w-full max-w-lg p-6 shadow-2xl z-10 mx-4">
        <div class="flex justify-between items-center pb-4 border-b border-slate-800">
            <h3 class="text-lg font-bold text-white" id="modal-contributor-title">Add Contributor</h3>
            <button onclick="closeModal('contributor')" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-lg"></i></button>
        </div>
        <form id="form-contributor" onsubmit="saveContributor(event)" class="space-y-4 mt-4">
            <input type="hidden" id="contributor-id">
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Name</label>
                <input type="text" id="contributor-name" required placeholder="e.g. Harish Jiji" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Email</label>
                <input type="email" id="contributor-email" required placeholder="e.g. harish@example.com" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Skills</label>
                <input type="text" id="contributor-skills" required placeholder="e.g. Django, Gardening, Solar Panel setup (comma separated)" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
            </div>
            <div class="flex justify-end gap-3 pt-4 border-t border-slate-800">
                <button type="button" onclick="closeModal('contributor')" class="px-4 py-2.5 border border-slate-800 rounded-xl text-slate-400 hover:text-white text-sm font-semibold transition-all duration-200">Cancel</button>
                <button type="submit" class="px-5 py-2.5 bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold text-sm rounded-xl shadow-lg shadow-emerald-500/20 transition-all duration-200">Save Contributor</button>
            </div>
        </form>
    </div>
</div>
